# DORA Path Planning Dataflow Configuration
nodes:
  - id: path_planning_node
    path: build/dora_planning_node
    inputs:
      start_point: 
        source: test_input_node/start_point
      goal_point: 
        source: test_input_node/goal_point
    outputs:
      - path
    env:
      MAP_YAML_PATH: map/test_map.yaml
      ALGORITHM: astar
 

  - id: visualize_node
    path: ./scripts/dora_visualize_node.py
    inputs:
      path: 
        source: path_planning_node/path
    env:
      MAP_YAML_PATH: map/test_map.yaml

  - id: test_input_node
    path: ./scripts/dora_test_input_node.py
    inputs:
      tick:
        source: dora/timer/millis/800
    outputs:
      - start_point
      - goal_point
